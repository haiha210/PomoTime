services:
  postgres:
    image: postgres:16-alpine
    container_name: pomotime-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pomotime
      POSTGRES_PASSWORD: pomotime
      POSTGRES_DB: pomotime
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pomotime -d pomotime"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pomotime_pgdata:/var/lib/postgresql/data

volumes:
  pomotime_pgdata:
