name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint:frontend

      - name: Frontend tests with coverage
        run: npm run test:coverage

  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Rust/Tauri prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          pkg-config --modversion gobject-2.0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust format and clippy
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pomotime
          POSTGRES_PASSWORD: pomotime
          POSTGRES_DB: pomotime
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pomotime -d pomotime"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://pomotime:pomotime@localhost:5432/pomotime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          pkg-config --modversion gobject-2.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Frontend typecheck and tests
        run: npm run typecheck && npm run test

      - name: Build frontend assets
        run: npm run build:web

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  desktop-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          pkg-config --modversion gobject-2.0

      - name: Install dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build:web

      - name: Desktop compile smoke (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build Windows installers (nsis + msi)
        if: matrix.os == 'windows-latest'
        run: npm run build

      - name: Upload Windows installers
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pomotime-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
